  <script>
    // Получаем yclid из URL (Яндекс Директ добавляет автоматически)
    function getParam(name) {
      var url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    // Получаем ClientID из Метрики и редиректим в бота
    function redirect() {
      var yclid = getParam("yclid");
      var utmSource = getParam("utm_source");

      ym(108213796, "getClientID", function(clientId) {
        // Формируем deep link: https://t.me/ctru_subscribe_bot?start=cid_XXXX--yclid_YYYY
        var payload = "";
        if (clientId) payload += "cid_" + clientId;
        if (yclid) payload += (payload ? "--" : "") + "yclid_" + yclid;

        var botUrl = payload
          ? "https://t.me/ctru_subscribe_bot?start=" + encodeURIComponent(payload)
          : "https://t.me/ctru_subscribe_bot";

        // Небольшая задержка чтобы Метрика успела зафиксировать визит
        setTimeout(function() {
          window.location.href = botUrl;
        }, 300);
      });
    }

    // Запускаем после загрузки Метрики
    window.addEventListener("load", redirect);
  </script>
